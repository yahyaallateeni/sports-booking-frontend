<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>تسجيل الدخول</title>
  <link rel="stylesheet" href="/assets/styles.css" />
  <script defer src="/assets/app.js"></script>
</head>
<body>
  <header class="topbar">
    <div class="container nav">
      <a class="brand" href="/">ملاعب</a>
      <nav class="nav-links">
        <a class="nav-link" href="/">الرئيسية</a>
        <a class="nav-link" href="/venues/">الملاعب</a>
        <a class="nav-link" href="/booking/">الحجز</a>
        <a class="nav-link" href="/profile/">حسابي</a>
        <a class="nav-link" href="/owner/">لوحة المالك</a>
        <a class="nav-link" href="/admin/">لوحة الأدمن</a>
      </nav>
      <div class="nav-actions">
        <a class="btn btn-secondary" href="/login/">الدخول</a>
        <a class="btn btn-primary" href="/register/">إنشاء حساب</a>
      </div>
    </div>
  </header>

  <section class="auth-wrap">
    <div class="container center">
      <div class="card auth-card">
        <h1 class="page-title" style="font-size:30px">تسجيل الدخول</h1>
        <p class="small" style="margin-top:10px">
          سجّل الدخول بالبريد الإلكتروني أو رقم الجوال.
        </p>

        <form id="login-form" class="list" style="margin-top:16px">
          <div class="field">
            <label for="emailOrPhone">البريد الإلكتروني أو الجوال</label>
            <input id="emailOrPhone" type="text" placeholder="name@example.com أو 05xxxxxxxx" required />
          </div>

          <div class="field">
            <label for="password">كلمة المرور</label>
            <input id="password" type="password" placeholder="********" required />
          </div>

          <div id="login-message" class="notice" style="display:none;"></div>

          <div class="toolbar" style="margin-top:16px">
            <button id="login-submit" class="btn btn-primary" type="submit">
              تسجيل الدخول
            </button>
            <a class="btn btn-secondary" href="/forgot-password/">نسيت كلمة المرور؟</a>
          </div>
        </form>

        <p class="small" style="margin-top:12px">
          ليس لديك حساب؟ <a href="/register/">أنشئ حسابًا جديدًا</a>
        </p>
      </div>
    </div>
  </section>

  <footer class="footer">
    <div class="container footer-inner">
      <div>© 2026 ملاعب. منصة حجز ملاعب رياضية.</div>
      <div>واجهة عربية وتجربة حجز واضحة وسريعة.</div>
    </div>
  </footer>

  <script src="/assets/api.js"></script>
  <script>
    const form = document.getElementById('login-form');
    const messageBox = document.getElementById('login-message');
    const submitBtn = document.getElementById('login-submit');

    function showMessage(text, isError = false) {
      messageBox.style.display = 'block';
      messageBox.textContent = text;
      messageBox.style.background = isError ? '#fee2e2' : '#dcfce7';
      messageBox.style.borderColor = isError ? '#fecaca' : '#bbf7d0';
      messageBox.style.color = isError ? '#991b1b' : '#166534';
    }

    function normalizeUser(result) {
      const apiUser = result && result.user ? result.user : {};
      const fullName =
        apiUser.fullName ||
        [apiUser.firstName, apiUser.lastName].filter(Boolean).join(' ').trim() ||
        '';

      return {
        id: apiUser.id || '',
        fullName: fullName,
        firstName: apiUser.firstName || '',
        lastName: apiUser.lastName || '',
        email: apiUser.email || '',
        phone: apiUser.phone || '',
        accountType: apiUser.accountType || 'CUSTOMER',
        status: apiUser.status || 'ACTIVE',
      };
    }

    function persistSession(result, user) {
      const accessToken = result.accessToken || '';
      const refreshToken = result.refreshToken || '';
      const userJson = JSON.stringify(user);

      localStorage.setItem('accessToken', accessToken);
      localStorage.setItem('refreshToken', refreshToken);
      localStorage.setItem('currentUser', userJson);
      localStorage.setItem('isAuthenticated', 'true');

      sessionStorage.setItem('accessToken', accessToken);
      sessionStorage.setItem('refreshToken', refreshToken);
      sessionStorage.setItem('currentUser', userJson);
      sessionStorage.setItem('isAuthenticated', 'true');
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      const emailOrPhone = document.getElementById('emailOrPhone').value.trim();
      const password = document.getElementById('password').value;

      messageBox.style.display = 'none';
      submitBtn.disabled = true;
      submitBtn.textContent = 'جاري تسجيل الدخول...';

      try {
        const result = await window.API.loginUser({
          emailOrPhone,
          password,
        });

        const user = normalizeUser(result);
        persistSession(result, user);

        showMessage('تم تسجيل الدخول بنجاح.');

        setTimeout(() => {
          if (user.accountType === 'OWNER') {
            window.location.href = '/owner/';
            return;
          }

          if (user.accountType === 'ADMIN') {
            window.location.href = '/admin/';
            return;
          }

          window.location.href = '/profile/';
        }, 900);
      } catch (error) {
        showMessage(error.message || 'فشل تسجيل الدخول.', true);
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'تسجيل الدخول';
      }
    });
  </script>
</body>
</html>
