<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>حجوزات الأدمن</title>
<link rel="stylesheet" href="/assets/styles.css" />
<script defer src="/assets/app.js"></script>

<style>

.admin-bookings-page { padding: 32px 0 48px; }

.page-head { margin-bottom: 24px; }

.page-head h1 {
margin: 0 0 8px;
font-size: 42px;
color: #0f172a;
}

.page-head p {
margin: 0;
color: #475569;
line-height: 1.8;
}

.notice-box {
display: none;
padding: 14px 16px;
border-radius: 14px;
margin-bottom: 18px;
font-size: 14px;
line-height: 1.7;
border: 1px solid transparent;
}

.notice-success {
background: #dcfce7;
color: #166534;
border-color: #bbf7d0;
}

.notice-error {
background: #fee2e2;
color: #991b1b;
border-color: #fecaca;
}

/* stats */

.stats-grid {
display: grid;
grid-template-columns: repeat(4, minmax(0, 1fr));
gap: 16px;
margin-bottom: 20px;
}

.stat-card {
background: #fff;
border: 1px solid #e2e8f0;
border-radius: 20px;
padding: 20px;
text-align: center;
}

.stat-card .num {
font-size: 48px;
font-weight: 800;
color: #0f172a;
margin-bottom: 6px;
}

.stat-card .label {
color: #334155;
font-weight: 700;
}

/* content */

.card-box {
background: #ffffff;
border: 1px solid #e2e8f0;
border-radius: 22px;
padding: 22px;
}

.toolbar {
display: grid;
grid-template-columns: 1fr auto;
gap: 12px;
align-items: end;
margin-bottom: 18px;
}

.field {
display: flex;
flex-direction: column;
gap: 8px;
}

.field label {
font-size: 14px;
font-weight: 700;
color: #334155;
}

.field input {
width: 100%;
min-height: 48px;
border: 1px solid #cbd5e1;
border-radius: 14px;
padding: 12px 14px;
background: #fff;
}

.bookings-grid {
display: grid;
gap: 14px;
}

.booking-card {
border: 1px solid #e2e8f0;
border-radius: 18px;
padding: 16px;
background: #fff;
}

.booking-head {
display: flex;
justify-content: space-between;
margin-bottom: 12px;
}

.booking-title {
margin: 0;
font-size: 20px;
color: #0f172a;
}

.booking-sub {
margin-top: 4px;
color: #64748b;
font-size: 14px;
}

.status-box {
display: flex;
flex-direction: column;
gap: 10px;
}

.pill {
padding: 6px 12px;
border-radius: 999px;
font-size: 13px;
font-weight: 700;
}

.pill-pending {
background: #fef3c7;
color: #92400e;
}

.pill-confirmed {
background: #dcfce7;
color: #166534;
}

.pill-cancelled {
background: #fee2e2;
color: #991b1b;
}

.booking-actions {
display: flex;
gap: 8px;
}

.booking-meta-grid {
display: grid;
grid-template-columns: repeat(4, minmax(0, 1fr));
gap: 10px;
}

.booking-meta-item {
background: #f8fafc;
border: 1px solid #e2e8f0;
border-radius: 14px;
padding: 10px 12px;
}

.meta-label {
font-size: 12px;
color: #64748b;
}

.meta-value {
font-weight: 700;
color: #0f172a;
}

.empty-state {
padding: 22px;
text-align: center;
color: #64748b;
border: 1px dashed #cbd5e1;
border-radius: 18px;
}

@media(max-width:900px){
.stats-grid,
.booking-meta-grid{
grid-template-columns:1fr;
}
}

</style>
</head>

<body>

<header class="topbar">
<div class="container nav">
<a class="brand" href="/">ملاعب</a>

<nav class="nav-links">
<a class="nav-link" href="/">الرئيسية</a>
<a class="nav-link" href="/venues/">الملاعب</a>
<a class="nav-link" href="/booking/">الحجز</a>
<a class="nav-link" href="/profile/">حسابي</a>
<a class="nav-link" href="/owner/">لوحة المالك</a>
<a class="nav-link" href="/admin/">لوحة الأدمن</a>
<a class="nav-link active" href="/admin/bookings/">الحجوزات</a>
</nav>

</div>
</header>

<main class="admin-bookings-page">
<div class="container">

<div class="page-head">
<h1>الحجوزات</h1>
<p>إدارة ومتابعة جميع الحجوزات.</p>
</div>

<div id="page-message" class="notice-box"></div>

<!-- stats -->

<section class="stats-grid">

<div class="stat-card">
<div id="stat-total" class="num">0</div>
<div class="label">إجمالي الحجوزات</div>
</div>

<div class="stat-card">
<div id="stat-pending" class="num">0</div>
<div class="label">قيد الانتظار</div>
</div>

<div class="stat-card">
<div id="stat-confirmed" class="num">0</div>
<div class="label">مؤكدة</div>
</div>

<div class="stat-card">
<div id="stat-cancelled" class="num">0</div>
<div class="label">ملغية</div>
</div>

</section>

<section class="card-box">

<div class="toolbar">
<div class="field">
<label>بحث</label>
<input id="search-input">
</div>

<button id="refresh-btn" class="btn btn-secondary">تحديث</button>
</div>

<div id="bookings-list-wrap">
<div class="empty-state">جار تحميل الحجوزات...</div>
</div>

</section>

</div>
</main>

<script>

let allBookings=[]

function updateStats(list){

document.getElementById('stat-total').textContent=list.length

document.getElementById('stat-pending').textContent=
list.filter(x=>x.status==='PENDING').length

document.getElementById('stat-confirmed').textContent=
list.filter(x=>x.status==='CONFIRMED').length

document.getElementById('stat-cancelled').textContent=
list.filter(x=>x.status==='CANCELLED').length

}

async function httpJson(path,options={}){

const res=await fetch(`/api/v1${path}`,{
headers:{'Content-Type':'application/json'},
...options
})

return res.json()

}

async function loadBookings(){

const data=await httpJson('/bookings')

allBookings=data

updateStats(allBookings)

renderBookings(allBookings)

}

function renderBookings(list){

const wrap=document.getElementById('bookings-list-wrap')

if(!list.length){

wrap.innerHTML='<div class="empty-state">لا توجد حجوزات</div>'

return

}

wrap.innerHTML=list.map(b=>`

<div class="booking-card">

<div class="booking-head">

<div>

<h3 class="booking-title">${b.customerName}</h3>

<div class="booking-sub">الملعب: ${b.venue?.nameAr||''}</div>

</div>

<div class="status-box">

<span class="pill pill-${b.status.toLowerCase()}">

${b.status}

</span>

<div class="booking-actions">

<button onclick="updateBooking('${b.id}','CONFIRMED')" class="btn btn-primary">تأكيد</button>

<button onclick="updateBooking('${b.id}','CANCELLED')" class="btn btn-secondary">إلغاء</button>

</div>

</div>

</div>

</div>

`).join('')

}

async function updateBooking(id,status){

await httpJson(`/bookings/${id}/status`,{
method:'PATCH',
body:JSON.stringify({status})
})

loadBookings()

}

loadBookings()

</script>

</body>
</html>
